<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAITON · UNIVERSE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;font-family:'IBM Plex Mono',monospace;overflow:hidden;color:#c8d0e0}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#ui{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:1;text-align:center;pointer-events:none}
#ui h1{font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.03);font-weight:300}
#ui .hint{font-size:6px;letter-spacing:3px;color:rgba(255,255,255,.02);margin-top:8px}
#info{position:fixed;top:32px;left:50%;transform:translateX(-50%);z-index:1;font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.04);pointer-events:none;text-align:center}
#info strong{color:rgba(0,212,170,.1)}
</style>
</head>
<body>
<div id="info">⬡ <strong>LAITON</strong> UNIVERSE · explore the ecosystem</div>
<div id="canvas"></div>
<div id="ui">
  <h1>✦ drag to explore · scroll to zoom ✦</h1>
  <div class="hint">each sphere is a project · the brighter, the more active</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const projects = [
  { name: 'glacial', desc: '3D frozen landscape', color: 0x88ddff, size: 1.0, active: true },
  { name: 'shiveria', desc: 'Ambient soundscape', color: 0x66bbff, size: 0.9, active: true },
  { name: 'deep', desc: 'Geometric void', color: 0x4444aa, size: 0.8, active: true },
  { name: 'creative-lab', desc: 'Experimental playground', color: 0xaa44ff, size: 0.7, active: true },
  { name: 'hub', desc: 'Central dashboard', color: 0x00d4aa, size: 1.2, active: true },
  { name: 'peersync-web', desc: 'P2P sync protocol', color: 0x44ffaa, size: 0.6, active: true },
  { name: 'laition-manager', desc: 'Employee management', color: 0xff8844, size: 0.5, active: true },
  { name: 'ServerIRC2', desc: 'Chat infrastructure', color: 0x4488ff, size: 0.7, active: true },
  { name: 'railway', desc: 'Railway deployment', color: 0x8844ff, size: 0.4, active: false },
  { name: 'ai', desc: 'Browser-based AI', color: 0x00ffaa, size: 1.1, active: true },
  { name: 'command-center', desc: 'Ecosystem monitoring', color: 0x00dd88, size: 0.6, active: true },
  { name: 'team', desc: 'Team directory', color: 0x4488dd, size: 0.5, active: true },
];

const container = document.getElementById('canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 14;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.maxDistance = 30;
controls.minDistance = 4;

// Stars
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const stars = [];
for (let i = 0; i < starCount; i++) {
  const r = 30 + Math.random() * 60;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos[i*3] = Math.sin(phi) * Math.cos(theta) * r;
  starPos[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
  starPos[i*3+2] = Math.cos(phi) * r;
  stars.push({ theta, phi, r, speed: 0.0001 + Math.random() * 0.0003 });
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0x444488,
  size: 0.08,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true
});
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// Orbital ring
const ringPoints = 128;
const ringGeo = new THREE.BufferGeometry();
const ringPos = new Float32Array(ringPoints * 3);
for (let i = 0; i < ringPoints; i++) {
  const a = (i / ringPoints) * Math.PI * 2;
  ringPos[i*3] = Math.cos(a) * 5.5;
  ringPos[i*3+1] = Math.sin(a) * 5.5 * 0.3;
  ringPos[i*3+2] = Math.sin(a) * 0;
}
ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
const ringMat = new THREE.LineBasicMaterial({
  color: 0x4444aa,
  transparent: true,
  opacity: 0.02,
  blending: THREE.AdditiveBlending
});
const ringLine = new THREE.Line(ringGeo, ringMat);
scene.add(ringLine);

// Central glow
const glowGeo = new THREE.SphereGeometry(0.15, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x00d4aa,
  transparent: true,
  opacity: 0.05
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// Project spheres
const spheres = [];
const connections = [];

projects.forEach((proj, i) => {
  const angle = (i / projects.length) * Math.PI * 2;
  const radius = 3.5 + Math.random() * 1.5;
  const height = (Math.random() - 0.5) * 2;
  
  const x = Math.cos(angle) * radius;
  const y = height;
  const z = Math.sin(angle) * radius;
  
  const size = proj.size * 0.25;
  const geo = new THREE.SphereGeometry(size, 24, 24);
  const mat = new THREE.MeshPhysicalMaterial({
    color: proj.color,
    emissive: proj.color,
    emissiveIntensity: proj.active ? 0.4 : 0.05,
    metalness: 0.1,
    roughness: 0.3,
    transparent: true,
    opacity: proj.active ? 0.9 : 0.2,
    clearcoat: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  
  // Glow halo
  const haloGeo = new THREE.SphereGeometry(size * 1.8, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({
    color: proj.color,
    transparent: true,
    opacity: 0.04,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.set(x, y, z);
  scene.add(halo);
  
  // Connection line to center
  const lineGeo = new THREE.BufferGeometry();
  const linePos = new Float32Array([
    0, 0, 0,
    x, y, z
  ]);
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: proj.color,
    transparent: true,
    opacity: 0.015 + Math.random() * 0.01,
    blending: THREE.AdditiveBlending
  });
  const line = new THREE.Line(lineGeo, lineMat);
  scene.add(line);
  
  // Label sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.font = '12px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillText(proj.name.toUpperCase(), 128, 28);
  
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    opacity: 0.3,
    blending: THREE.AdditiveBlending
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(x, y - size - 0.4, z);
  sprite.scale.set(1.2, 0.3, 1);
  scene.add(sprite);
  
  spheres.push({
    mesh, halo, sprite, proj,
    angle, radius, height,
    speed: 0.001 + Math.random() * 0.003,
    phase: Math.random() * Math.PI * 2
  });
});

// Active connection lines between projects
for (let i = 0; i < projects.length; i++) {
  for (let j = i + 1; j < projects.length; j++) {
    if (Math.random() > 0.7) {
      const a = spheres[i].mesh.position;
      const b = spheres[j].mesh.position;
      const lineGeo = new THREE.BufferGeometry();
      const linePos = new Float32Array([
        a.x, a.y, a.z,
        b.x, b.y, b.z
      ]);
      lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
      const lineMat = new THREE.LineBasicMaterial({
        color: 0x4444aa,
        transparent: true,
        opacity: 0.008,
        blending: THREE.AdditiveBlending
      });
      const line = new THREE.Line(lineGeo, lineMat);
      scene.add(line);
      connections.push(line);
    }
  }
}

// Pulse animation
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  
  // Auto-rotate
  controls.update();
  
  // Pulse spheres
  spheres.forEach((s, i) => {
    const pulse = 0.8 + 0.2 * Math.sin(time * 2 + s.phase);
    s.mesh.scale.setScalar(pulse);
    s.halo.scale.setScalar(1 + 0.2 * Math.sin(time * 2 + s.phase));
    s.halo.material.opacity = 0.03 + 0.02 * Math.sin(time * 2 + s.phase);
    
    // Gentle float
    s.mesh.position.y = s.height + 0.3 * Math.sin(time * s.speed * 10 + s.phase);
    s.halo.position.y = s.mesh.position.y;
    s.sprite.position.y = s.mesh.position.y - s.proj.size * 0.25 - 0.4;
    
    // Label visibility on hover
    s.sprite.material.opacity = 0.15 + 0.1 * Math.sin(time + i);
  });
  
  // Star rotation
  starField.rotation.y += 0.0002;
  starField.rotation.x += 0.00005;
  
  // Ring pulse
  ringLine.scale.setScalar(1 + 0.02 * Math.sin(time * 1.5));
  
  // Central glow
  glow.scale.setScalar(1 + 0.3 * Math.sin(time));
  
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
