<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAITON · TEAM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;font-family:'IBM Plex Mono',monospace;color:#c8d0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.ring{position:relative;width:100%;max-width:900px}
h1{font-size:32px;font-weight:300;letter-spacing:12px;color:rgba(255,255,255,.06);text-align:center;margin-bottom:40px}
h1 span{color:rgba(0,212,170,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px}
.card{background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);border-radius:4px;padding:20px;text-align:center;transition:.4s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,170,.05),transparent);transform:translateY(0);transition:.4s}
.card:hover{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06);transform:translateY(-4px)}
.card:hover::before{background:linear-gradient(90deg,transparent,rgba(0,212,170,.2),transparent);height:2px}
.avatar{width:48px;height:48px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(68,68,170,.1));border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.15);transition:.3s}
.card:hover .avatar{border-color:rgba(0,212,170,.1);color:rgba(0,212,170,.3)}
.name{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.6);margin-bottom:4px}
.role{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.1);text-transform:uppercase;margin-bottom:8px}
.email{font-size:6px;color:rgba(255,255,255,.04);letter-spacing:1px;word-break:break-all}
.badge{display:inline-block;font-size:5px;letter-spacing:2px;padding:2px 8px;border-radius:2px;background:rgba(255,255,255,.02);color:rgba(255,255,255,.08);margin-top:8px;text-transform:uppercase;border:1px solid rgba(255,255,255,.03)}
.super_admin .badge{color:rgba(0,212,170,.2);border-color:rgba(0,212,170,.05)}
.admin .badge{color:rgba(255,215,0,.2);border-color:rgba(255,215,0,.05)}
.manager .badge{color:rgba(68,136,255,.2);border-color:rgba(68,136,255,.05)}
.employee .badge{color:rgba(255,255,255,.08);border-color:rgba(255,255,255,.02)}
.legend{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-top:20px;font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.04)}
.legend span{display:flex;align-items:center;gap:6px}
.legend .d{width:6px;height:6px;border-radius:50%}
footer{text-align:center;margin-top:40px;font-size:6px;color:rgba(255,255,255,.02);letter-spacing:3px}
</style>
</head>
<body>
<div class="ring">
  <h1>⬡ <span>LAITON</span></h1>
  <div class="grid" id="team-grid"></div>
  <div class="legend">
    <span><span class="d" style="background:#00d4aa"></span>super_admin</span>
    <span><span class="d" style="background:#ffd700"></span>admin</span>
    <span><span class="d" style="background:#4488ff"></span>manager</span>
    <span><span class="d" style="background:rgba(255,255,255,.1)"></span>employee</span>
  </div>
  <footer>✧ 7 members · active since 2026 ✧</footer>
</div>
<script>
const team = [
  {name:"Laiton",role:"super_admin",email:"laiton@laiton.group",initial:"L"},
  {name:"Nicolas",role:"super_admin",email:"nicolas@laiton.group",initial:"N"},
  {name:"Antoine",role:"admin",email:"antoine@laiton.group",initial:"A"},
  {name:"Theodort",role:"admin",email:"theodort@laiton.group",initial:"T"},
  {name:"Marie",role:"manager",email:"marie@laiton.group",initial:"M"},
  {name:"Julien",role:"employee",email:"julien@laiton.group",initial:"J"},
  {name:"Claire",role:"employee",email:"claire@laiton.group",initial:"C"}
];
const grid = document.getElementById('team-grid');
grid.innerHTML = team.map(m => `
  <div class="card ${m.role}">
    <div class="avatar">${m.initial}</div>
    <div class="name">${m.name}</div>
    <div class="role">${m.role.replace('_',' ')}</div>
    <div class="email">${m.email}</div>
    <div class="badge">${m.role.replace('_',' ')}</div>
  </div>
`).join('');
</script>
</body>
</html>
