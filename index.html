<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAITON · ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#a0a5b1;color:#1a1a1a;font-family:'IBM Plex Mono',monospace;overflow:hidden;height:100vh}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.content{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;pointer-events:none}
.logo{position:relative;margin-bottom:8px}
.logo img{width:clamp(80px,20vw,160px);height:auto;display:block;margin:0 auto;opacity:.9}
.logo-text{font-size:clamp(36px,8vw,72px);font-weight:500;color:#1a1a1a;letter-spacing:12px;text-transform:uppercase;line-height:1}
.tagline{font-size:clamp(10px,1.5vw,14px);color:rgba(0,0,0,.35);margin-top:6px;letter-spacing:6px;text-transform:uppercase}
.tagline span{color:rgba(0,0,0,.2)}
.links{display:flex;gap:clamp(6px,1.5vw,14px);margin-top:28px;flex-wrap:wrap;justify-content:center;pointer-events:auto}
.links a{color:rgba(0,0,0,.45);text-decoration:none;font-size:clamp(9px,1vw,11px);letter-spacing:3px;text-transform:uppercase;padding:8px 16px;border:1px solid rgba(0,0,0,.08);transition:.25s;background:rgba(255,255,255,.15);backdrop-filter:blur(4px)}
.links a:hover{color:#1a1a1a;border-color:rgba(0,0,0,.2);background:rgba(255,255,255,.3);transform:translateY(-1px)}
.status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(0,0,0,.15);letter-spacing:4px;text-transform:uppercase}
.status .dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.3);margin-right:5px;animation:pulse 2s infinite}
.eco{position:fixed;bottom:24px;right:24px;font-size:7px;color:rgba(0,0,0,.08);letter-spacing:3px;text-transform:uppercase;pointer-events:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@media(max-width:600px){.links a{padding:6px 12px;font-size:8px;letter-spacing:2px}}
</style>
</head>
<body>
<div id="bg"></div>
<div class="content">
  <div class="logo">
    <img src="githublaiton.png" alt="LAITON">
  </div>
  <div class="logo-text">LAITON</div>
  <div class="tagline">build <span>·</span> code <span>·</span> create</div>
  <div class="links">
    <a href="https://github.com/Laiton-Group">github</a>
    <a href="lab.html">lab</a>
    <a href="manager.html">manager</a>
    <a href="igloo.html">igloo</a>
    <a href="igloo2.html">igloo creative</a>
    <a href="glacial.html">glacial</a>
    <a href="shiveria.html">shiveria</a>
    <a href="void.html">void</a>
    <a href="game.html">asteroids</a>
    <a href="about.html">about</a>
    <a href="vision.html">vision</a>
    <a href="missions.html">missions</a>
    <a href="divisions.html">divisions</a>
  </div>
</div>
<div class="status"><span class="dot"></span>online</div>
<div class="eco">✧ laiton ecosystem</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container=document.getElementById('bg'),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,.1,1000),renderer=new THREE.WebGLRenderer({alpha:true,antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));container.appendChild(renderer.domElement)
const n=90,nodes=[],pos=new Float32Array(n*3)
for(let i=0;i<n;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=4+Math.random()*6;pos[i*3]=Math.sin(p)*Math.cos(t)*r;pos[i*3+1]=Math.sin(p)*Math.sin(t)*r;pos[i*3+2]=Math.cos(p)*r;nodes.push({vx:(Math.random()-.5)*.002,vy:(Math.random()-.5)*.002,vz:(Math.random()-.5)*.002})}
const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3))
const m=new THREE.PointsMaterial({color:0x1a1a1a,size:.06,transparent:true,opacity:.25,blending:THREE.AdditiveBlending})
const ps=new THREE.Points(g,m);scene.add(ps)
const lm=new THREE.LineBasicMaterial({color:0x1a1a1a,transparent:true,opacity:.04,blending:THREE.AdditiveBlending})
camera.position.z=12;let mx=0,my=0
document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth)*2-1;my=-(e.clientY/window.innerHeight)*2+1})
function uc(){const p=ps.geometry.attributes.position.array,pr=[];for(let i=0;i<n;i++){for(let j=i+1;j<n;j++){const dx=p[i*3]-p[j*3],dy=p[i*3+1]-p[j*3+1],dz=p[i*3+2]-p[j*3+2],d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<2.5)pr.push({i,j,a:1-d/2.5})}}if(!window.lg||window.lc!==pr.length){window.lc=pr.length;if(window.lg){scene.remove(window.ls);window.lg.dispose()}if(!pr.length)return;const v=[];pr.forEach(p=>{v.push(p[p.i*3],p[p.i*3+1],p[p.i*3+2]);v.push(p[p.j*3],p[p.j*3+1],p[p.j*3+2])});window.lg=new THREE.BufferGeometry();window.lg.setAttribute('position',new THREE.Float32BufferAttribute(v,3));window.ls=new THREE.LineSegments(window.lg,lm);scene.add(window.ls)}else if(window.lg){const v=[];pr.forEach(p=>{v.push(p[p.i*3],p[p.i*3+1],p[p.i*3+2]);v.push(p[p.j*3],p[p.j*3+1],p[p.j*3+2])});window.lg.attributes.position.array.set(v);window.lg.attributes.position.needsUpdate=true}}
function animate(){requestAnimationFrame(animate);const p=ps.geometry.attributes.position.array;for(let i=0;i<n;i++){p[i*3]+=nodes[i].vx;p[i*3+1]+=nodes[i].vy;p[i*3+2]+=nodes[i].vz;const r=Math.sqrt(p[i*3]**2+p[i*3+1]**2+p[i*3+2]**2);if(r>12||r<2){nodes[i].vx*=-1;nodes[i].vy*=-1;nodes[i].vz*=-1}}ps.geometry.attributes.position.needsUpdate=true;uc();scene.rotation.x+=(my*.3-scene.rotation.x)*.02;scene.rotation.y+=(mx*.5-scene.rotation.y)*.02;renderer.render(scene,camera)}
animate()
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})
</script>
</body>
</html>
