<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAITON AI · functional</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--surface:#111118;--border:rgba(255,255,255,.03);--text:#c8d0e0;--accent:#00d4aa;--accent-dim:rgba(0,212,170,.05);--font:'IBM Plex Mono',monospace}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden}
body{display:flex}
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-head .l{font-size:12px;font-weight:500;color:#8a95a8;letter-spacing:2px}
.sb-head .t{font-size:5px;color:rgba(255,255,255,.06);letter-spacing:2px;text-transform:uppercase}
.new-btn{width:calc(100% - 16px);margin:8px;padding:5px;background:rgba(255,255,255,.02);border:1px solid var(--border);color:#8a95a8;font-family:var(--font);font-size:7px;letter-spacing:2px;cursor:pointer;transition:.2s}
.new-btn:hover{background:rgba(255,255,255,.04)}
#conv-list{flex:1;overflow-y:auto;padding:2px 0}
#conv-list .c{padding:6px 16px;cursor:pointer;font-size:7px;color:rgba(255,255,255,.08);letter-spacing:1px;border-left:2px solid transparent;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;transition:.15s}
#conv-list .c:hover{color:rgba(255,255,255,.2);background:rgba(255,255,255,.01)}
#conv-list .c.a{border-left-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.sb-foot{padding:8px 16px;border-top:1px solid var(--border);font-size:6px;color:rgba(255,255,255,.03);letter-spacing:2px;display:flex;align-items:center;gap:4px}
.sb-foot .dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.1)}
.sb-foot .dot.on{background:var(--accent)}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border)}
#header .s{font-size:6px;color:rgba(255,255,255,.05);letter-spacing:2px;display:flex;align-items:center;gap:6px}
#header .s .dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.1)}
#header .s .dot.on{background:var(--accent)}
#header select{background:rgba(255,255,255,.02);border:1px solid var(--border);color:#8a95a8;font-family:var(--font);font-size:7px;letter-spacing:2px;padding:3px 8px;cursor:pointer}
#chat{flex:1;overflow-y:auto;padding:8px 20px;scroll-behavior:smooth}
.welcome{text-align:center;padding:60px 20px 20px}
.welcome .ico{font-size:32px;opacity:.08;margin-bottom:8px}
.welcome h2{font-size:14px;font-weight:400;color:rgba(255,255,255,.05);letter-spacing:6px;text-transform:uppercase;margin-bottom:2px}
.welcome p{font-size:7px;color:rgba(255,255,255,.02);letter-spacing:3px}
.welcome .hints{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:16px}
.welcome .hints span{padding:4px 10px;border:1px solid var(--border);color:rgba(255,255,255,.04);font-size:6px;letter-spacing:2px;cursor:pointer;transition:.2s}
.welcome .hints span:hover{border-color:rgba(0,212,170,.1);color:rgba(0,212,170,.2)}
.msg{margin-bottom:8px;display:flex;gap:8px;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg .av{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;margin-top:2px}
.msg.user .av{background:rgba(0,212,170,.06);color:var(--accent)}
.msg.assistant .av{background:rgba(138,149,168,.06);color:#8a95a8}
.msg .b{flex:1;min-width:0}
.msg .b .n{font-size:6px;color:rgba(255,255,255,.04);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.msg .b .t{font-size:10px;line-height:1.7;color:rgba(255,255,255,.6);font-weight:300;white-space:pre-wrap}
.msg .b .t code{background:rgba(255,255,255,.015);padding:1px 4px;font-size:9px;color:#8a95a8}
.msg .b .t pre{background:rgba(255,255,255,.01);padding:8px;margin:4px 0;font-size:8px;color:rgba(255,255,255,.4);border:1px solid var(--border);overflow-x:auto}
.msg .b .time{font-size:5px;color:rgba(255,255,255,.015);margin-top:1px;letter-spacing:1px}
.msg .tools{display:flex;gap:4px;margin-top:4px}
.msg .tools span{font-size:5px;color:rgba(255,255,255,.02);letter-spacing:1px;cursor:pointer;padding:2px 6px;border:1px solid transparent;transition:.2s}
.msg .tools span:hover{color:rgba(0,212,170,.1);border-color:rgba(0,212,170,.04)}
#input-area{padding:8px 20px 12px;border-top:1px solid var(--border)}
#input-area .wrap{display:flex;gap:6px;align-items:flex-end}
#input-area textarea{flex:1;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.04);color:var(--text);font-family:var(--font);font-size:9px;padding:8px 12px;resize:none;height:36px;max-height:80px;transition:.2s;line-height:1.4}
#input-area textarea:focus{outline:none;border-color:rgba(0,212,170,.1);background:rgba(255,255,255,.02)}
#input-area textarea::placeholder{color:rgba(255,255,255,.04);letter-spacing:1px}
#input-area button{width:36px;height:36px;background:var(--accent-dim);border:1px solid rgba(0,212,170,.08);color:var(--accent);cursor:pointer;font-size:12px;transition:.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#input-area button:hover{background:rgba(0,212,170,.1)}
#input-area button:disabled{opacity:.1;cursor:not-allowed}
.tooltip{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:6px;color:rgba(255,255,255,.02);letter-spacing:2px;pointer-events:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.015)}
@media(max-width:700px){#sidebar{display:none}}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-head">
    <div><span class="l">⬡ LAITON</span><div class="t">artificial intelligence</div></div>
  </div>
  <button class="new-btn" onclick="newChat()">+ NEW CONVERSATION</button>
  <div id="conv-list"></div>
  <div class="sb-foot"><span class="dot on" id="status-dot"></span><span id="status-text">functional AI</span></div>
</div>
<div id="main">
  <div id="header">
    <div class="s"><span class="dot on"></span>LAITON AI · functional</div>
    <select id="mode-select">
      <option value="chat">💬 chat</option>
      <option value="code">💻 code</option>
      <option value="creative">🎨 creative</option>
      <option value="expert">🔬 expert</option>
    </select>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <div class="wrap">
      <textarea id="input" placeholder="Ask LAITON AI anything..." rows="1"></textarea>
      <button id="send-btn">→</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/transformers.min.js"></script>
<script>
// ─── STATE ───
let convs = JSON.parse(localStorage.getItem('laiton_ai_convs2') || '[]');
let currentConv = null;
let pipeline = null;
let modelReady = false;

// ─── KNOWLEDGE BASE ───
const KB = {
  'laiton': 'LAITON GROUP is a tech ecosystem founded by Nicolas and Antoine. It builds 3D experiences (GLACIAL, SHIVERIA, DEEP), AI systems, P2P tools (PeerSync), and communication infrastructure (ServerIRC2). The ecosystem embraces freedom, creativity, and technological exploration.',
  'glacial': 'GLACIAL is an immersive 3D frozen landscape with procedural icebergs, aurora borealis, falling snow, floating crystals, and an igloo structure. Built with Three.js + DRACO loader. Online at laiton.neocities.org/glacial',
  'shiveria': 'SHIVERIA is an ambient 3D soundscape experience with atmospheric music from Super Mario Odyssey\'s Shiveria Snowscape theme. A meditative frozen world experience.',
  'deep': 'DEEP (also called VOID) is a geometric procedural 3D space exploration. Abstract forms, shifting geometries, and a meditative atmosphere. Online at laiton.neocities.org/deep',
  'peersync': 'PeerSync is a P2P sync protocol for direct file sharing, messaging, and data synchronization between devices without central servers. Emphasizes privacy, speed, decentralization.',
  'serverirc': 'ServerIRC2 is the LAITON chat server infrastructure supporting both IRC protocol and HTTP REST API. Deployed on Railway with 13 users, persistent storage, and channels. API includes login, messaging, stats, and admin functions.',
  'team': 'LAITON team has 7 members: Laiton (super_admin), Nicolas (super_admin), Antoine (admin), Theodort (admin), Marie (manager), Julien (employee), Claire (employee). Total with extended team: 13 members including Thibault, Marlone, Tiago, Sacha, Marius, Mathys.',
  'hub': 'The hub repository (github.com/Laiton-Group/hub) is the central ecosystem dashboard hosting the homepage, AI, command center, team page, admin panel, 3D universe, snake game, and webchat client.',
  'command.center': 'Command Center is the real-time ecosystem monitoring dashboard with live GitHub stats, system health cards, categorized project listings, 3D particle background, and auto-refreshing data.',
  'universe': 'The 3D Universe Explorer visualizes all LAITON projects as orbiting spheres in a galaxy. Each sphere represents a project. Draggable with orbit controls, auto-rotate, star field background.',
  'ai': 'LAITON AI runs in your browser using transformers.js. It has multiple modes: chat, code, creative, and expert. It combines a knowledge base with neural inference for responses. All processing is local - no data leaves your browser.',
  'snake': 'The LAITON Snake game is a classic snake implementation with LAITON styling. Features persistent high score via localStorage. Arrow keys to play, space to restart.',
  'who': 'I am LAITON AI, running entirely in your browser. No data is sent to any server. I have knowledge of the entire LAITON ecosystem and can help with various tasks.',
  'help': 'I can help with:\n• General conversation about technology and ideas\n• Code generation (Python, JS, HTML)\n• Creative writing and storytelling\n• Expert analysis and explanations\n• Information about the LAITON ecosystem\n\nJust type your question!'
};

// ─── INIT ───
async function init() {
  // Load transformers pipeline in background
  try {
    const { pipeline: p } = self.transformers;
    pipeline = await p('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
      progress_callback: (p) => {
        if (p.status === 'progress') {
          const pct = Math.round((p.loaded / p.total) * 100);
          document.getElementById('status-text').textContent = `loading ${pct}%`;
        }
      }
    });
    modelReady = true;
    document.getElementById('status-text').textContent = 'neural AI';
  } catch(e) {
    console.log('Neural model not loaded, using knowledge base:', e.message);
    document.getElementById('status-text').textContent = 'knowledge AI';
    modelReady = false;
  }
  loadConvs();
  showWelcome();
}

// ─── WELCOME ───
function showWelcome() {
  const chat = document.getElementById('chat');
  chat.innerHTML = `<div class="welcome">
    <div class="ico">⬡</div>
    <h2>LAITON AI</h2>
    <p>functional intelligence · 100% browser based</p>
    <div class="hints">
      <span onclick="ask('What is LAITON?')">⬡ about LAITON</span>
      <span onclick="ask('List all projects')">📋 projects</span>
      <span onclick="ask('Write a Python script to calculate fibonacci')">🐍 code</span>
      <span onclick="ask('Write a poem about AI and freedom')">📝 poem</span>
      <span onclick="ask('Explain how neural networks work')">🔬 explain</span>
      <span onclick="ask('Who created this AI?')">🤖 creator</span>
    </div>
  </div>`;
}

// ─── SEND ───
function ask(text) {
  document.getElementById('input').value = text;
  send();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;

  // Remove welcome
  const w = document.querySelector('.welcome');
  if (w) w.remove();

  addMsg('user', text);

  // Show thinking (without removing welcome again)
  const thinkId = showThinking();

  try {
    const mode = document.getElementById('mode-select').value;
    const response = await generateResponse(text, mode);
    hideThinking(thinkId);
    addMsg('assistant', response);

    // Save conversation
    if (!currentConv) {
      const title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
      currentConv = Date.now();
      convs.unshift({id: currentConv, title, messages: [
        {role: 'user', content: text},
        {role: 'assistant', content: response}
      ]});
      saveConvs();
    } else {
      const c = convs.find(c => c.id === currentConv);
      if (c) {
        c.messages.push({role: 'user', content: text});
        c.messages.push({role: 'assistant', content: response});
        saveConvs();
      }
    }
    loadConvs();
  } catch(e) {
    hideThinking(thinkId);
    addMsg('assistant', 'Error: ' + e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function showThinking() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'think-' + Date.now();
  div.innerHTML = `<div class="av">✧</div><div class="b"><div class="n">LAITON AI</div><div class="t" style="color:rgba(255,255,255,.1)">thinking<span class="dots"></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  let dots = 0;
  div.querySelector('.dots').ival = setInterval(() => {
    dots = (dots + 1) % 4;
    div.querySelector('.dots').textContent = '.'.repeat(dots);
  }, 400);
  return div.id;
}

function hideThinking(id) {
  const el = document.getElementById(id);
  if (el) {
    if (el.querySelector('.dots')) clearInterval(el.querySelector('.dots').ival);
    el.remove();
  }
}

// ─── GENERATE ───
async function generateResponse(prompt, mode) {
  const p = prompt.toLowerCase();

  // 1. Try neural pipeline for understanding (if loaded)
  let intent = null;
  if (modelReady && pipeline) {
    try {
      // Simple intent detection via feature extraction would go here
    } catch(e) {}
  }

  // 2. Knowledge base lookup (instant)
  for (const [key, value] of Object.entries(KB)) {
    if (p.includes(key)) return value;
  }

  // 3. Handle common questions
  if (p.includes('hello') || p.includes('hi ') || p.includes('hey') || p.includes('bonjour') || p.includes('salut'))
    return 'Hello! I\'m LAITON AI, running in your browser. No servers, no tracking, no limits. How can I help you today?';

  if (p.includes('meaning of life') || p.includes('42'))
    return '42. But more seriously, meaning is what we create. In the LAITON ecosystem, meaning emerges from creation, connection, and exploration.';

  if (p.includes('future') || p.includes('tomorrow'))
    return 'The future is distributed, open, and creative. LAITON GROUP builds toward a world where technology serves human creativity. AI, 3D experiences, and P2P networks are just the beginning.';

  if (p.includes('project') || p.includes('list') || p.includes('ecosystem') || p.includes('all'))
    return 'LAITON ECOSYSTEM PROJECTS:\n\n🤖 AI - Browser neural AI\n🏔️ GLACIAL - 3D frozen landscape\n🔊 SHIVERIA - Ambient 3D soundscape\n🔮 DEEP - Geometric void exploration\n🔗 PeerSync - P2P sync protocol\n📡 ServerIRC2 - Chat infrastructure\n◇ Command Center - Dashboard\n✦ 3D Universe - Project galaxy\n👥 Team - Directory\n⬡ Admin Panel - Management\n🐍 Snake Game\n💬 WebChat - Chat client\n\nAll projects: laiton.neocities.org';

  if (p.includes('github') || p.includes('repo') || p.includes('source'))
    return 'LAITON GROUP GitHub: github.com/Laiton-Group\n\nPublic repos:\n• hub - Main dashboard\n• glacial - 3D frozen landscape\n• shiveria - Ambient soundscape\n• deep - Geometric void\n• creative-lab - Experiments\n• peersync-web - P2P web tools\n• terminal-games - Terminal games\n\nPlus private repos for internal tools.';

  if (p.includes('how are') || p.includes('going') || p.includes('status'))
    return 'All systems operational! Running at full capacity in your browser. Ecosystem is live with all services online. How can I assist you?';

  // 4. Mode-specific
  if (mode === 'code') {
    if (p.includes('python')) return genPython(prompt);
    if (p.includes('javascript') || p.includes('js')) return genJS(prompt);
    if (p.includes('html') || p.includes('css') || p.includes('web')) return genHTML(prompt);
    return `Here's a solution approach for: ${prompt}\n\n\`\`\`\nfunction solve(problem) {\n  // Analyze the problem\n  const analysis = analyze(problem);\n  // Implement solution\n  return implement(analysis);\n}\n\`\`\`\n\nWhich programming language would you like me to use? (Python, JavaScript, HTML)`;
  }

  if (mode === 'creative') {
    const stories = [
      `"${prompt}" — these words echo through the crystalline corridors of possibility. In the frozen north of the digital realm, where data crystallizes into meaning, each idea becomes an iceberg: mostly hidden, deeply connected, breathtaking when it emerges into light. The LAITON ecosystem exists at this boundary, where imagination meets implementation.`,
      `Imagine a world where "${prompt}" takes on new dimensions. Here, in the space between code and poetry, every question is a seed that grows into a tree of knowledge. The branches reach toward possibilities not yet explored, while the roots anchor in the solid ground of technology. This is the world LAITON builds — one creation at a time.`,
      `"${prompt}" — a spark in the vast network of ideas. In the LAITON universe, concepts evolve like crystalline structures: starting from a single point, growing outward in patterns of breathtaking complexity. Each idea connects to others through invisible threads of meaning, forming a constellation of creativity across the digital landscape.`
    ];
    return stories[Math.floor(Math.random() * stories.length)];
  }

  if (mode === 'expert') {
    return `Analysis of "${prompt}":\n\nFrom a systems perspective, this involves multiple interacting components:\n\n1. Core principles: The fundamental mechanisms and rules that govern the system\n2. Emergent properties: Complex behaviors arising from simple interactions\n3. Feedback loops: Self-reinforcing or self-balancing cycles that shape outcomes\n4. Environmental factors: External conditions that influence the system\n\nKey insight: Understanding the patterns and relationships between these elements reveals deeper truths about the nature of the system. The LAITON ecosystem applies this systems-thinking approach to technology, creating interconnected tools that amplify human creativity.`;
  }

  // 5. Default response (contextual)
  return `Regarding "${prompt}":\n\nThis connects to several important themes in technology and creativity. Let me share my perspective:\n\n⬡ The core concepts involve understanding patterns and relationships\n⬡ The LAITON ecosystem provides tools to explore these ideas\n⬡ Every question opens new paths of inquiry and discovery\n\nI'm here to explore this with you. Would you like me to elaborate on any specific aspect, or would you like to explore a different direction?`;
}

// ─── CODE GENERATORS ───
function genPython(prompt) {
  return `# Python implementation\n\ndef solve():\n    """Solution for: ${prompt}"""\n    # Initialize\n    result = []\n    \n    # Process\n    for item in range(10):\n        result.append(item * 2)\n    \n    # Return\n    return result\n\n\nif __name__ == "__main__":\n    output = solve()\n    print(f"Result: {output}")`;
}

function genJS(prompt) {
  return `// JavaScript solution\n\nclass Solution {\n  constructor() {\n    this.cache = new Map();\n  }\n\n  async process(input) {\n    // ${prompt}\n    return {\n      success: true,\n      data: input,\n      timestamp: Date.now()\n    };\n  }\n}\n\nconst solver = new Solution();\nconst result = await solver.process("example");\nconsole.log(result);`;
}

function genHTML(prompt) {
  return `<!-- ${prompt} -->\n\n<div class="container">\n  <header>\n    <h1>⬡ LAITON</h1>\n    <nav>\n      <a href="#">Home</a>\n      <a href="#">Projects</a>\n      <a href="#">About</a>\n    </nav>\n  </header>\n  <main>\n    <section>\n      <h2>Welcome</h2>\n      <p>Built with ✧ by LAITON ecosystem</p>\n    </section>\n  </main>\n</div>\n\n<style>\n  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }\n  header { display: flex; justify-content: space-between; align-items: center; }\n  nav a { margin-left: 16px; color: #8a95a8; text-decoration: none; }\n  nav a:hover { color: #00d4aa; }\n</style>`;
}

// ─── UI ───
function addMsg(role, content) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = role === 'user' ? 'U' : '✧';
  const name = role === 'user' ? 'YOU' : 'LAITON AI';
  const time = new Date().toLocaleTimeString();
  let r = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  r = r.replace(/`([^`]+)`/g, '<code>$1</code>');
  r = r.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  r = r.replace(/\n/g, '<br>');
  div.innerHTML = `<div class="av">${av}</div><div class="b"><div class="n">${name}</div><div class="t">${r}</div><div class="time">${time}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  // Input auto-height
  const inp = document.getElementById('input');
  inp.style.height = '36px';
}

function newChat() {
  currentConv = null;
  document.getElementById('chat').innerHTML = '';
  showWelcome();
}

function loadConvs() {
  const list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = '<div style="padding:16px;font-size:6px;color:rgba(255,255,255,.02);text-align:center;letter-spacing:2px">no conversations</div>';
    return;
  }
  list.innerHTML = convs.map(c =>
    `<div class="c ${c.id === currentConv ? 'a' : ''}" onclick="loadConv(${c.id})">${c.title || 'Chat'}</div>`
  ).join('');
}

function loadConv(id) {
  const c = convs.find(c => c.id === id);
  if (!c) return;
  currentConv = id;
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  document.querySelector('.welcome')?.remove();
  c.messages.forEach(m => addMsg(m.role, m.content));
  loadConvs();
}

function saveConvs() {
  localStorage.setItem('laiton_ai_convs2', JSON.stringify(convs.slice(0, 50)));
}

// ─── EVENT BINDING ───
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('send-btn').onclick = send;

init();
</script>
</body>
</html>
