<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⬡ LAITON · CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;font-family:'IBM Plex Mono',monospace;color:#c8d0e0;height:100vh;display:flex;flex-direction:column}
h1{font-size:9px;font-weight:300;letter-spacing:5px;color:rgba(255,255,255,.03);padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.01);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
h1 span{color:rgba(0,212,170,.08)}
h1 .s{font-size:7px;color:rgba(255,255,255,.02);letter-spacing:2px}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:200px;background:rgba(255,255,255,.005);border-right:1px solid rgba(255,255,255,.01);display:flex;flex-direction:column;flex-shrink:0}
#sidebar .sh{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.04);padding:12px 14px 6px;text-transform:uppercase}
#channels{flex:1;overflow-y:auto;padding:4px}
.channel{padding:6px 12px;font-size:9px;color:rgba(255,255,255,.1);cursor:pointer;border-radius:2px;letter-spacing:1px;display:flex;align-items:center;gap:6px;transition:.15s}
.channel::before{content:'#';color:rgba(255,255,255,.03)}
.channel:hover{color:rgba(255,255,255,.25);background:rgba(255,255,255,.01)}
.channel.active{color:rgba(0,212,170,.3);background:rgba(0,212,170,.02)}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:6px;font-size:10px;display:flex;gap:8px;align-items:flex-start}
.msg .u{color:rgba(0,212,170,.2);letter-spacing:1px;flex-shrink:0;width:80px;text-align:right;overflow:hidden;text-overflow:ellipsis}
.msg .t{color:rgba(255,255,255,.25);word-break:break-word}
.msg .time{font-size:6px;color:rgba(255,255,255,.02);flex-shrink:0;width:50px}
.system{text-align:center;font-size:7px;color:rgba(255,255,255,.02);padding:4px 0;letter-spacing:2px}
#input{display:flex;padding:8px 16px;border-top:1px solid rgba(255,255,255,.01);gap:8px;align-items:center}
#input input{flex:1;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);padding:8px 12px;color:rgba(255,255,255,.4);font-family:inherit;font-size:10px;outline:none;border-radius:2px;letter-spacing:1px}
#input input:focus{border-color:rgba(0,212,170,.05);color:rgba(255,255,255,.6)}
#input button{background:rgba(0,212,170,.02);border:1px solid rgba(0,212,170,.05);padding:8px 14px;color:rgba(0,212,170,.15);font-family:inherit;font-size:8px;cursor:pointer;letter-spacing:2px;border-radius:2px;transition:.2s}
#input button:hover{background:rgba(0,212,170,.05);color:rgba(0,212,170,.3)}
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a10;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100}
#login.h{opacity:0;pointer-events:none;transition:.4s}
#login h2{font-size:9px;font-weight:300;letter-spacing:5px;color:rgba(255,255,255,.04);margin-bottom:24px}
#login .input{background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);padding:8px 12px;color:rgba(255,255,255,.3);font-family:inherit;font-size:10px;outline:none;width:240px;margin-bottom:8px;letter-spacing:2px;text-align:center}
#login .input:focus{border-color:rgba(0,212,170,.05);color:rgba(255,255,255,.6)}
#login .btn{background:rgba(0,212,170,.02);border:1px solid rgba(0,212,170,.05);padding:8px 24px;color:rgba(0,212,170,.15);font-family:inherit;font-size:8px;cursor:pointer;letter-spacing:3px;transition:.2s;text-transform:uppercase}
#login .btn:hover{background:rgba(0,212,170,.05);color:rgba(0,212,170,.3)}
#login .e{font-size:8px;color:rgba(255,255,255,.02);margin-top:12px;letter-spacing:2px}
.status-dot{width:4px;height:4px;border-radius:50%;display:inline-block;margin-right:4px}
</style>
</head>
<body>
<div id="login">
  <h2>⬡ <span style="color:rgba(0,212,170,.06)">LAITON</span> CHAT</h2>
  <input class="input" id="user-input" placeholder="username" autocomplete="off">
  <input class="input" id="pass-input" type="password" placeholder="password" autocomplete="off">
  <button class="btn" id="login-btn">connect</button>
  <div class="e" id="login-error"></div>
</div>

<h1>⬡ <span>LAITON</span> CHAT <span class="s" id="status">disconnected</span></h1>
<div id="main">
  <div id="sidebar">
    <div class="sh">channels</div>
    <div id="channels"></div>
  </div>
  <div id="chat">
    <div id="messages"></div>
    <div id="input">
      <input id="msg-input" placeholder="type a message..." disabled>
      <button id="send-btn" disabled>send</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let user = null, pass = null, role = null;
let lastId = 0, currentChan = 'general', pollTimer = null;

const loginEl = document.getElementById('login');
const statusEl = document.getElementById('status');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const msgBox = document.getElementById('messages');
const chanList = document.getElementById('channels');
const userInput = document.getElementById('user-input');
const passInput = document.getElementById('pass-input');
const loginBtn = document.getElementById('login-btn');
const loginErr = document.getElementById('login-error');

function addMsg(text, type='system') {
  const div = document.createElement('div');
  div.className = type === 'system' ? 'system' : 'msg';
  if (type === 'system') {
    div.textContent = text;
  } else {
    div.innerHTML = `<span class="time">${type.time||''}</span><span class="u">${type.user}</span><span class="t">${type.text}</span>`;
  }
  msgBox.appendChild(div);
  msgBox.scrollTop = msgBox.scrollHeight;
}

function addChan(name) {
  const existing = document.querySelector(`.channel[data-chan="${name}"]`);
  if (existing) return;
  const div = document.createElement('div');
  div.className = 'channel' + (name === currentChan ? ' active' : '');
  div.dataset.chan = name;
  div.textContent = name;
  div.onclick = () => switchChan(name);
  chanList.appendChild(div);
}

function switchChan(name) {
  currentChan = name;
  document.querySelectorAll('.channel').forEach(c => c.classList.toggle('active', c.dataset.chan === name));
  msgBox.innerHTML = '';
  lastId = 0;
  loadMsgs();
}

async function login(username, password) {
  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user: username, pass: password})
    });
    const data = await res.json();
    if (data.ok) {
      user = username; pass = password; role = data.role;
      loginEl.classList.add('h');
      statusEl.innerHTML = `<span class="status-dot" style="background:rgba(0,212,170,.3)"></span>${user}`;
      msgInput.disabled = false;
      sendBtn.disabled = false;
      loadChannels();
      loadMsgs();
      startPolling();
    } else {
      loginErr.textContent = data.error || 'login failed';
    }
  } catch(e) {
    loginErr.textContent = 'connection error: ' + e.message;
  }
}

async function loadChannels() {
  try {
    const res = await fetch(`${API}/api/channels`);
    const chans = await res.json();
    chanList.innerHTML = '';
    chans.forEach(addChan);
    document.querySelectorAll('.channel').forEach(c => c.classList.toggle('active', c.dataset.chan === currentChan));
  } catch(e) {}
}

async function loadMsgs() {
  try {
    const res = await fetch(`${API}/api/msgs?after=${lastId}`);
    const msgs = await res.json();
    if (msgs.length) {
      msgs.filter(m => m.chan === currentChan).forEach(m => {
        if (m.id > lastId) lastId = m.id;
        addMsg(m.text, {user: m.user, text: m.text, time: ''});
      });
    }
  } catch(e) {}
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadMsgs, 2000);
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  try {
    await fetch(`${API}/api/send`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user, pass, text, chan: currentChan})
    });
  } catch(e) {}
}

sendBtn.onclick = sendMsg;
msgInput.onkeydown = e => { if (e.key === 'Enter') sendMsg(); };

loginBtn.onclick = () => login(userInput.value, passInput.value);
userInput.onkeydown = e => { if (e.key === 'Enter') passInput.focus(); };
passInput.onkeydown = e => { if (e.key === 'Enter') login(userInput.value, passInput.value); };

// Default channels
addChan('general');
</script>
</body>
</html>
